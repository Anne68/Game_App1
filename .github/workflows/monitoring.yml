name: Production Monitoring

on:
  schedule:
    # Toutes les 6 heures
    - cron: '0 */6 * * *'
  # Déclenchement manuel
  workflow_dispatch:
    inputs:
      api_url:
        description: 'URL de l\'API à monitorer'
        required: false
        default: 'https://game-app-y8be.onrender.com'
      alert_level:
        description: 'Niveau d\'alerte'
        required: false
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - critical

jobs:
  health-monitoring:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        pip install requests python-dotenv
    
    - name: API Health Check
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
      run: |
        python -c "
        import requests
        import sys
        import json
        from datetime import datetime
        
        API_URL = '${{ env.API_URL }}'
        print(f'🏥 Vérification de santé: {API_URL}')
        
        try:
            response = requests.get(f'{API_URL}/healthz', timeout=30)
            if response.status_code == 200:
                data = response.json()
                status = data.get('status', 'unknown')
                model_loaded = data.get('model_loaded', False)
                db_ready = data.get('db_ready', False)
                
                print(f'✅ API Status: {status}')
                print(f'🤖 Model Loaded: {model_loaded}')
                print(f'🗄️ DB Ready: {db_ready}')
                
                # Vérifications critiques
                if status != 'healthy':
                    print(f'⚠️ API status is not healthy: {status}')
                    sys.exit(1)
                    
                if not model_loaded:
                    print('⚠️ Model is not loaded')
                    sys.exit(1)
                    
                print('🎉 Health check passed')
            else:
                print(f'❌ Health check failed: {response.status_code}')
                print(f'Response: {response.text}')
                sys.exit(1)
                
        except Exception as e:
            print(f'💥 Health check error: {e}')
            sys.exit(1)
        "
    
    - name: Model Performance Check
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        python scripts/validate_model.py \
          --api-url "$API_URL" \
          --username "$TEST_USERNAME" \
          --password "$TEST_PASSWORD"
    
    - name: Check Model Drift
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        python -c "
        import requests
        import sys
        import json
        
        API_URL = '${{ env.API_URL }}'
        USERNAME = '${{ env.TEST_USERNAME }}'
        PASSWORD = '${{ env.TEST_PASSWORD }}'
        
        if not USERNAME or not PASSWORD:
            print('⚠️ Test credentials not configured')
            sys.exit(0)
        
        try:
            # Auth
            auth_response = requests.post(f'{API_URL}/token', 
                data={'username': USERNAME, 'password': PASSWORD}, timeout=10)
            
            if auth_response.status_code != 200:
                print('⚠️ Authentication failed for drift check')
                sys.exit(0)
            
            token = auth_response.json()['access_token']
            headers = {'Authorization': f'Bearer {token}'}
            
            # Check drift
            drift_response = requests.get(f'{API_URL}/monitoring/drift', 
                                        headers=headers, timeout=15)
            
            if drift_response.status_code == 200:
                drift_data = drift_response.json()
                status = drift_data.get('status', 'unknown')
                score = drift_data.get('drift_score', 0)
                
                print(f'📊 Model Drift Status: {status}')
                print(f'📈 Drift Score: {score:.3f}')
                
                if status == 'high_drift':
                    print('🚨 HIGH DRIFT DETECTED - Model needs retraining!')
                    # Set GitHub Actions output for notification
                    print('::set-output name=high_drift::true')
                    print('::set-output name=drift_score::{}'.format(score))
                elif status == 'moderate_drift':
                    print('⚠️ Moderate drift - Monitor closely')
                else:
                    print('✅ Drift within acceptable range')
            else:
                print(f'⚠️ Could not check drift: {drift_response.status_code}')
                
        except Exception as e:
            print(f'⚠️ Drift monitoring error: {e}')
        "
      id: drift-check
    
    - name: Metrics Collection
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
      run: |
        python -c "
        import requests
        import sys
        
        API_URL = '${{ env.API_URL }}'
        
        try:
            # Test metrics endpoint
            response = requests.get(f'{API_URL}/metrics', timeout=10)
            if response.status_code == 200:
                metrics_text = response.text
                # Parse some key metrics
                lines = metrics_text.split('\n')
                
                predictions_total = 0
                latency_samples = 0
                
                for line in lines:
                    if 'model_predictions_total' in line and not line.startswith('#'):
                        try:
                            predictions_total += float(line.split()[-1])
                        except:
                            pass
                    elif 'prediction_latency_seconds_count' in line and not line.startswith('#'):
                        try:
                            latency_samples += float(line.split()[-1])
                        except:
                            pass
                
                print(f'📊 Total Predictions: {int(predictions_total)}')
                print(f'⏱️ Latency Samples: {int(latency_samples)}')
                print('✅ Metrics endpoint accessible')
            else:
                print(f'⚠️ Metrics endpoint not accessible: {response.status_code}')
                
        except Exception as e:
            print(f'⚠️ Metrics collection error: {e}')
        "
    
    - name: Performance Benchmark
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        python -c "
        import requests
        import time
        import statistics
        import sys
        
        API_URL = '${{ env.API_URL }}'
        USERNAME = '${{ env.TEST_USERNAME }}'
        PASSWORD = '${{ env.TEST_PASSWORD }}'
        
        if not USERNAME or not PASSWORD:
            print('⚠️ Test credentials not configured for benchmark')
            sys.exit(0)
        
        try:
            # Auth
            auth_response = requests.post(f'{API_URL}/token', 
                data={'username': USERNAME, 'password': PASSWORD})
            token = auth_response.json()['access_token']
            headers = {'Authorization': f'Bearer {token}'}
            
            # Benchmark predictions
            queries = ['Action', 'RPG', 'Strategy', 'Simulation', 'Adventure']
            response_times = []
            
            print('🏃 Running performance benchmark...')
            
            for query in queries:
                start = time.time()
                response = requests.post(f'{API_URL}/recommend/ml',
                                       json={'query': query, 'k': 5},
                                       headers=headers, timeout=30)
                duration = (time.time() - start) * 1000  # ms
                
                if response.status_code == 200:
                    response_times.append(duration)
                    data = response.json()
                    rec_count = len(data.get('recommendations', []))
                    print(f'  {query}: {duration:.1f}ms ({rec_count} recs)')
                else:
                    print(f'  {query}: FAILED ({response.status_code})')
            
            if response_times:
                avg_time = statistics.mean(response_times)
                p95_time = statistics.quantiles(response_times, n=20)[18]  # 95th percentile
                
                print(f'📊 Benchmark Results:')
                print(f'  Average: {avg_time:.1f}ms')
                print(f'  P95: {p95_time:.1f}ms')
                print(f'  Min: {min(response_times):.1f}ms')
                print(f'  Max: {max(response_times):.1f}ms')
                
                # SLA checks
                if avg_time > 1000:
                    print('⚠️ Average response time exceeds SLA (1s)')
                if p95_time > 2000:
                    print('⚠️ P95 response time exceeds SLA (2s)')
                    
                print('✅ Performance benchmark completed')
            else:
                print('❌ No successful requests in benchmark')
                
        except Exception as e:
            print(f'💥 Benchmark error: {e}')
        "
    
    - name: Send Alert on High Drift
      if: steps.drift-check.outputs.high_drift == 'true'
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        DRIFT_SCORE: ${{ steps.drift-check.outputs.drift_score }}
      run: |
        if [ ! -z "$SLACK_WEBHOOK" ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 HIGH DRIFT DETECTED in Games API ML Model\\nDrift Score: $DRIFT_SCORE\\nAction Required: Model retraining recommended\"}" \
            "$SLACK_WEBHOOK"
        else
          echo "⚠️ Slack webhook not configured - cannot send alert"
        fi

  database-monitoring:
    runs-on: ubuntu-latest
    if: github.event.inputs.alert_level != 'info'
    
    steps:
    - name: Check Database Connection
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
      run: |
        python -c "
        import requests
        import sys
        
        API_URL = '${{ env.API_URL }}'
        
        try:
            response = requests.get(f'{API_URL}/healthz', timeout=30)
            if response.status_code == 200:
                data = response.json()
                db_ready = data.get('db_ready', False)
                db_error = data.get('db_error')
                
                if db_ready:
                    print('✅ Database connection healthy')
                else:
                    print(f'❌ Database connection failed')
                    if db_error:
                        print(f'Error: {db_error}')
                    sys.exit(1)
            else:
                print(f'❌ Cannot check database status: {response.status_code}')
                sys.exit(1)
                
        except Exception as e:
            print(f'💥 Database check error: {e}')
            sys.exit(1)
        "

  security-monitoring:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check SSL/TLS
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
      run: |
        # Extract hostname from URL
        HOSTNAME=$(echo "$API_URL" | sed 's|https\?://||' | cut -d'/' -f1)
        echo "🔒 Checking SSL for: $HOSTNAME"
        
        # Check SSL certificate
        if command -v openssl >/dev/null 2>&1; then
          echo | openssl s_client -servername $HOSTNAME -connect $HOSTNAME:443 -brief 2>/dev/null | head -20
          
          # Check expiration
          EXPIRY=$(echo | openssl s_client -servername $HOSTNAME -connect $HOSTNAME:443 2>/dev/null | openssl x509 -noout -dates | grep notAfter | cut -d= -f2)
          if [ ! -z "$EXPIRY" ]; then
            echo "📅 Certificate expires: $EXPIRY"
          fi
        else
          echo "⚠️ OpenSSL not available for SSL check"
        fi
    
    - name: Check API Security Headers
      env:
        API_URL: ${{ github.event.inputs.api_url || 'https://game-app-y8be.onrender.com' }}
      run: |
        python -c "
        import requests
        import sys
        
        API_URL = '${{ env.API_URL }}'
        
        try:
            response = requests.get(f'{API_URL}/healthz', timeout=10)
            headers = response.headers
            
            security_headers = [
                'X-Content-Type-Options',
                'X-Frame-Options', 
                'X-XSS-Protection',
                'Strict-Transport-Security'
            ]
            
            print('🛡️ Security Headers Check:')
            for header in security_headers:
                if header in headers:
                    print(f'  ✅ {header}: {headers[header]}')
                else:
                    print(f'  ⚠️ {header}: Missing')
            
        except Exception as e:
            print(f'⚠️ Security headers check error: {e}')
        "
