name: Weekly update (direct MySQL)

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Execute notebook
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          python - <<'PY'
import pathlib, papermill as pm
nb = pathlib.Path("Récupération de donnée.ipynb")
pm.execute_notebook(
    input_path=str(nb),
    output_path="data/run_output.ipynb",
    parameters={},
    cwd=str(nb.parent)
)
print("[OK] Notebook exécuté et écrit en base MySQL.")
PY
